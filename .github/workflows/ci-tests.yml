name: CIG Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run comprehensive functional tests
        run: |
          python3 comprehensive_functionality_test.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v3
        with:
          name: cig-functionality-report
          path: |
            cig_functionality_report.json
            cif_functionality_report.txt
            cig_functionality_test_report.json
